<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>PSD2 Demo</title>
</head>
<body>

  <h1>PSD2 Demo</h1>
  <p>Stap 3: Bankdata ophalen (mock)</p>

  <button id="consentBtn">
    Geef toestemming om bankdata te lezen
  </button>

  <p id="status"></p>

  <pre id="output"></pre>

  <script>

    const button = document.getElementById("consentBtn");
    const statusText = document.getElementById("status");
    const output = document.getElementById("output");

    button.addEventListener("click", () => {
      statusText.textContent = "✅ Toestemming gegeven. Bankdata ophalen...";

      // Simuleer PSD2 bank API response
      const bankData = {
        rekening: {
          iban: "NL12BANK0123456789",
          saldo: 1543.27,
          valuta: "EUR"
        },
        transacties: [
          {
            datum: "2026-03-01",
            omschrijving: "Albert Heijn",
            bedrag: -45.20
          },
          {
            datum: "2026-03-03",
            omschrijving: "Spotify",
            bedrag: -12.99
          },
          {
            datum: "2026-03-05",
            omschrijving: "Salaris",
            bedrag: 2400.00
          }
        ]
      };

      // Toon data als JSON
      output.textContent = JSON.stringify(bankData, null, 2);
    });

  </script>

</body>
</html>
